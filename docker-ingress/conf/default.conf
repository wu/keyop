server {
    listen 80;
    server_name ${APP_DOMAIN};

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
   listen 443 ssl default_server;
   server_name keyop.geekfarm.org;

   ssl_certificate /etc/nginx/certbot/live/keyop.geekfarm.org/fullchain.pem;
   ssl_certificate_key /etc/nginx/certbot/live/keyop.geekfarm.org/privkey.pem;

   ssl_prefer_server_ciphers on;

   #access_log  /var/log/nginx/host.access.log  main;

   # SSE endpoint — requires long-lived connection with no buffering
   location /events {
        proxy_pass http://172.18.0.3:8080;

        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Disable proxy buffering so events are flushed immediately to the client
        proxy_buffering         off;
        proxy_cache             off;

        # SSE connections must stay open indefinitely; prevent proxy timeout
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;

        # Required for HTTP/1.1 chunked streaming
        proxy_http_version      1.1;
        proxy_set_header        Connection '';
        chunked_transfer_encoding on;
   }

   location / {
        proxy_pass http://172.18.0.3:8080;

        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
   }
}


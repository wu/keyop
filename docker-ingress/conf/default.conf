server {
    listen 80;
    server_name ${APP_DOMAIN};

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
   listen 443 ssl default_server;
   server_name keyop.geekfarm.org;

   ssl_certificate /etc/nginx/certbot/live/keyop.geekfarm.org/fullchain.pem;
   ssl_certificate_key /etc/nginx/certbot/live/keyop.geekfarm.org/privkey.pem;

   ssl_prefer_server_ciphers on;

   #access_log  /var/log/nginx/host.access.log  main;

   location / {
        proxy_pass http://172.18.0.3:8080;

        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
   }
}


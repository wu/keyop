x: speak

config:

  rate_limit_per_minute: 5

  pub_preprocess:

    - when: 'event eq "rate_limit"'
      updates:
        channelName: alerts

    - when: 'event eq "error"'
      updates:
        channelName: errors

    - when: 'event eq "speech"'
      updates:
        channelName: spoken


subs:
  alerts:
    name: alerts
    description: Speak "Summary" or "Text" field from messages from the alerts channel



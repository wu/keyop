<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>keyop — Sign in</title>
    <link href="/images/keyop.png" rel="icon" type="image/png">
    <link href="/css/theme.css" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
        }

        .login-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            padding: 2.5rem 2rem;
            background: var(--tab-content-bg, #1e1e22);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
            border-radius: 14px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 12px;
        }

        .login-title {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .login-message {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.65;
            text-align: center;
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            background: var(--accent, #9b5af0);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            opacity: 0.88;
        }

        .login-btn:active {
            opacity: 0.75;
        }

        .login-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .login-error {
            margin: 0;
            font-size: 0.82rem;
            color: #f87171;
            text-align: center;
        }

        .login-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div class="login-card">
    <img alt="keyop logo" class="login-logo" src="/images/keyop.png">
    <h1 class="login-title">keyop</h1>
    <p class="login-message" id="login-message">Checking…</p>
    <button class="login-btn" id="login-btn" style="display:none">
        <span>Sign in with Passkey</span>
    </button>
    <button class="login-btn" id="register-btn" style="display:none">
        <span>Register Passkey</span>
    </button>
    <p class="login-error" id="login-error" style="display:none"></p>
</div>
<script src="/js/auth.js" type="module"></script>
</body>
</html>

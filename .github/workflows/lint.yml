name: Lint & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    # Skip the automated chore(release) commit pushed back by semantic-release.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin a recent Go version explicitly so the runner's toolchain can compile
          # dependencies such as golang.org/x/tools@v0.21.0 which require a newer Go
          # (do not rely on go-version-file here to avoid resolution issues on runners).
          go-version: '1.26'

      - name: Clean Go caches
        run: |
          # Clear any stale compiled export data that can confuse the analyzers in golangci-lint
          # (resolves errors like "unsupported version: 2" caused by mismatched export data).
          go clean -cache -modcache -testcache || true

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Get GOROOT from the runner
        id: get-goroot
        run: |
          echo "GOROOT=$(go env GOROOT)" >> "$GITHUB_OUTPUT"

      - name: Run golangci-lint using container
        run: |
          # Run the official golangci-lint container image to avoid building the
          # linter on the runner and to isolate the analysis environment.
          # Mount the runner's GOROOT into the container so the in-container 'go'
          # tooling can find the host-installed toolchain required for modules
          # that specify newer Go versions (e.g., go 1.26).
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v "${{ steps.get-goroot.outputs.GOROOT }}:/usr/local/go" \
            -e PATH="/usr/local/go/bin:$PATH" \
            -w /app golangci/golangci-lint:v1.59.0 \
            golangci-lint run --out-format=colored-line-number ./...

      - name: Check formatting (gofmt)
        run: |
          echo "Checking gofmt..."
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found files needing formatting:"; gofmt -l .; exit 1
          fi

      - name: Run tests
        run: |
          go test ./...

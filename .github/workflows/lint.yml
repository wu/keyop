name: Lint & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    # Skip the automated chore(release) commit pushed back by semantic-release.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin a recent Go version explicitly so the runner's toolchain can compile
          # dependencies such as golang.org/x/tools@v0.21.0 which require a newer Go
          # (do not rely on go-version-file here to avoid resolution issues on runners).
          go-version: '1.26'

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.59.0
          args: run ./...

      - name: Check formatting (gofmt)
        run: |
          echo "Checking gofmt..."
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found files needing formatting:"; gofmt -l .; exit 1
          fi

      - name: Run tests
        run: |
          go test ./...

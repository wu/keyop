name: Lint & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    # Skip the automated chore(release) commit pushed back by semantic-release.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install linters
        run: |
          echo "Installing linters with go install to ensure they are built with the runner's Go toolchain"
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Check formatting (gofmt)
        run: |
          echo "Checking gofmt..."
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found files needing formatting:"; gofmt -l .; exit 1
          fi

      - name: Run golangci-lint
        env:
          GOBIN: $(go env GOPATH)/bin
        run: |
          $(go env GOPATH)/bin/golangci-lint run ./...

      - name: Run staticcheck
        run: |
          staticcheck ./...

      - name: Run tests
        run: |
          go test ./...

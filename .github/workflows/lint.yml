name: Lint & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    # Skip the automated chore(release) commit pushed back by semantic-release.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin a recent Go version explicitly so the runner's toolchain can compile
          # dependencies such as golang.org/x/tools@v0.21.0 which require a newer Go
          # (do not rely on go-version-file here to avoid resolution issues on runners).
          go-version: '1.26'

      - name: Clean Go caches
        run: |
          # Clear any stale compiled export data that can confuse the analyzers in golangci-lint
          # (resolves errors like "unsupported version: 2" caused by mismatched export data).
          go clean -cache -modcache -testcache || true

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install golangci-lint (prebuilt)
        run: |
          # Download and install the official prebuilt golangci-lint binary for linux/amd64.
          # Installing the release binary avoids building x/tools on the runner which
          # can fail due to tokeninternal size mismatches with some toolchains.
          curl -sSfL -o /tmp/golangci-lint.tar.gz \
            https://github.com/golangci/golangci-lint/releases/download/v1.59.0/golangci-lint-1.59.0-linux-amd64.tar.gz
          tar -xzf /tmp/golangci-lint.tar.gz -C /tmp
          sudo mv /tmp/golangci-lint-1.59.0-linux-amd64/golangci-lint /usr/local/bin/golangci-lint
          sudo chmod +x /usr/local/bin/golangci-lint

      - name: Run golangci-lint
        run: |
          # Ensure caches are clear so analyzers recompile packages with the runner's Go toolchain
          # (avoids export-data format mismatches).
          go clean -cache -modcache -testcache || true
          golangci-lint run --timeout=10m --out-format=colored-line-number ./...

      - name: Check formatting (gofmt)
        run: |
          echo "Checking gofmt..."
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found files needing formatting:"; gofmt -l .; exit 1
          fi

      - name: Run tests
        run: |
          go test ./...

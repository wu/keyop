name: Lint & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    # Temporarily disabled
    if: "false"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin a recent Go version explicitly so the runner's toolchain can compile
          # dependencies such as golang.org/services/tools@v0.21.0 which require a newer Go
          # (do not rely on go-version-file here to avoid resolution issues on runners).
          go-version: '1.26'

      - name: Clean Go caches
        run: |
          # Clear any stale compiled export data that can confuse the analyzers in golangci-lint
          # (resolves errors like "unsupported version: 2" caused by mismatched export data).
          go clean -cache -modcache -testcache || true

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install golangci-lint
        run: |
          # Build and install golangci-lint with the runner's Go toolchain to ensure
          # analyzers are compiled against Go 1.26 and compatible x/tools.
          mkdir -p "$GITHUB_WORKSPACE/.bin"
          GOBIN="$GITHUB_WORKSPACE/.bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1
          echo "$GITHUB_WORKSPACE/.bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint
        run: |
          # Clear caches and run the linter.
          go clean -cache -modcache -testcache || true
          golangci-lint run --timeout=10m ./...

      - name: Check formatting (gofmt)
        run: |
          echo "Checking gofmt..."
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found files needing formatting:"; gofmt -l .; exit 1
          fi

      - name: Run tests
        run: |
          go test ./...

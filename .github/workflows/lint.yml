name: Lint & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    # Skip the automated chore(release) commit pushed back by semantic-release.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin a recent Go version explicitly so the runner's toolchain can compile
          # dependencies such as golang.org/x/tools@v0.21.0 which require a newer Go
          # (do not rely on go-version-file here to avoid resolution issues on runners).
          go-version: '1.26'

      - name: Clean Go caches
        run: |
          # Clear any stale compiled export data that can confuse the analyzers in golangci-lint
          # (resolves errors like "unsupported version: 2" caused by mismatched export data).
          go clean -cache -modcache -testcache || true

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install golangci-lint from source
        run: |
          # Install the linter using the runner's Go toolchain so the binary is
          # built with the same Go version (avoids export-data mismatches).
          GOBIN=$(go env GOBIN)
          if [ -z "$GOBIN" ]; then
            GOBIN=$(go env GOPATH)/bin
          fi
          export PATH="$GOBIN:$PATH"
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0
          echo "golangci-lint installed to: $(which golangci-lint || true)"

      - name: Run golangci-lint
        run: |
          # Use colored-line-number output format; keep CI output compact.
          GOBIN=$(go env GOBIN)
          if [ -z "$GOBIN" ]; then
            GOBIN=$(go env GOPATH)/bin
          fi
          export PATH="$GOBIN:$PATH"
          golangci-lint run --out-format=colored-line-number ./...

      - name: Check formatting (gofmt)
        run: |
          echo "Checking gofmt..."
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found files needing formatting:"; gofmt -l .; exit 1
          fi

      - name: Run tests
        run: |
          go test ./...

name: Lint & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    # Skip the automated chore(release) commit pushed back by semantic-release.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin a recent Go version explicitly so the runner's toolchain can compile
          # dependencies such as golang.org/x/tools@v0.21.0 which require a newer Go
          # (do not rely on go-version-file here to avoid resolution issues on runners).
          go-version: '1.26'

      - name: Clean Go caches
        run: |
          # Clear any stale compiled export data that can confuse the analyzers in golangci-lint
          # (resolves errors like "unsupported version: 2" caused by mismatched export data).
          go clean -cache -modcache -testcache || true

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install golangci-lint
        run: |
          # Install golangci-lint binary on the runner using the official install script.
          # This avoids analyzer/export-data mismatches caused by containerized toolchains
          # downloading a different Go toolchain.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.59.0

      - name: Run golangci-lint
        run: |
          # Run the installed linter locally on the runner where Go 1.26 is set up.
          golangci-lint run --out-format=colored-line-number ./...

      - name: Check formatting (gofmt)
        run: |
          echo "Checking gofmt..."
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found files needing formatting:"; gofmt -l .; exit 1
          fi

      - name: Run tests
        run: |
          go test ./...

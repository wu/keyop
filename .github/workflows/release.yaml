name: Release

# ──────────────────────────────────────────────────────────────────────────────
# Trigger: every push to main.
#
# Job flow:
#   semantic-release  →  (on new tag/release published)  →  build-release
#
#  • semantic-release  analyses Conventional Commits, bumps the version,
#    creates a git tag, publishes a GitHub Release, and commits CHANGELOG.md.
#    If no releasable commits are present it exits 0 and the build job is skipped.
#
#  • build-release  cross-compiles binaries for every supported platform and
#    uploads them as assets to the GitHub Release just created.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["main"]

permissions:
  contents: write   # push tag + release, commit CHANGELOG
  issues: write     # semantic-release GitHub plugin
  pull-requests: write

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 – semantic-release
  # ────────────────────────────────────────────────────────────────────────────
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest

    outputs:
      # "true" when a new release was actually published this run.
      released: ${{ steps.release.outputs.new_release_published }}
      version:  ${{ steps.release.outputs.new_release_version }}

    steps:
      - name: Checkout (full history required by semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the CHANGELOG commit can trigger downstream workflows.
          # Falls back to GITHUB_TOKEN if the secret is not set.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install semantic-release and plugins
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME:  github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME:  github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 – cross-compile and upload release assets
  # ────────────────────────────────────────────────────────────────────────────
  build-release:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: semantic-release
    # Only run when a new release was actually published.
    if: needs.semantic-release.outputs.released == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64             }
          - { goos: linux,   goarch: arm64             }
          - { goos: linux,   goarch: arm,   goarm: "6" }
          - { goos: darwin,  goarch: amd64             }
          - { goos: darwin,  goarch: arm64             }
          - { goos: windows, goarch: amd64             }
          - { goos: windows, goarch: "386"             }

    steps:
      - name: Checkout at the new tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.version }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM:  ${{ matrix.goarm }}
        run: |
          VERSION="${{ needs.semantic-release.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X keyop/cmd.Version=${VERSION} \
                   -X keyop/cmd.Commit=${COMMIT} \
                   -X keyop/cmd.Branch=main \
                   -X keyop/cmd.BuildTime=${BUILD_TIME}"

          EXT=""
          [[ "${GOOS}" == "windows" ]] && EXT=".exe"

          GOARM_SUFFIX=""
          [[ -n "${GOARM}" ]] && GOARM_SUFFIX="-arm${GOARM}"

          BINARY="keyop-${GOOS}-${GOARCH}${GOARM_SUFFIX}${EXT}"
          mkdir -p output
          go build -ldflags "${LDFLAGS}" -o "output/${BINARY}"
          gzip "output/${BINARY}"

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.version }}
          files: output/*.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
